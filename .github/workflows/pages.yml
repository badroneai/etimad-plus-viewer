name: Deploy Kashaf Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the canonical snapshot
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify exporter tests
        run: python3 -m unittest discover -s tests -v

      - name: Verify browser JavaScript syntax
        run: node --check assets/app.js

      - name: Verify local static-data contract
        run: python3 scripts/check_data_contract.py --root .

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build the exact static site artifact
        run: |
          mkdir -p _site
          cp index.html .nojekyll _site/
          cp -R assets data _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

  deploy:
    needs: verify-and-package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy immutable Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
